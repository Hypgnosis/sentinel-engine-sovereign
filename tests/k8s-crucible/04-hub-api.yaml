apiVersion: apps/v1
kind: Deployment
metadata:
  name: crucible-hub-api
  namespace: sentinel-crucible
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crucible-hub-api
  template:
    metadata:
      labels:
        app: crucible-hub-api
    spec:
      containers:
      - name: hub-api
        image: gcr.io/ha-sentinel-core-v21/sentinel-hub-api:latest # To be built via deploy script
        env:
        - name: CRUCIBLE_DB_DSN
          value: "postgres://sentinel:crucible_test_2026@crucible-pgbouncer:6432/sentinel_hub?sslmode=disable"
        - name: CRUCIBLE_HUB_PORT
          value: "8081"
        ports:
        - containerPort: 8081
        resources:
          requests:
            cpu: "2"
            memory: "2Gi"
          limits:
            cpu: "4"
            memory: "4Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: crucible-hub-api
  namespace: sentinel-crucible
spec:
  ports:
  - port: 8081
    targetPort: 8081
  selector:
    app: crucible-hub-api
